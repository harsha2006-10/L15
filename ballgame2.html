<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Ball Game (Static)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #2d3a3f;
            border: 3px solid #000;
        }

        .ball {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #ff6347;
            transform: translate(-50%, -50%);
        }

        .paddle {
            position: absolute;
            bottom: 10px;
            left: 50%;
            width: 100px;
            height: 15px;
            background-color: #007bff;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="ball"></div>
    <div class="paddle"></div>
</div>

</body>
</html>
